# docker-compose.yml
version: '3'

networks:
  todoapp-net:

services:
  pythonapp:
    image: todoapp:2.0.0
    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "8080:8080"

    environment:
      - PYTHONUNBUFFERED=1

      - ENGINE=django.db.backends.mysql
      - NAME=app_db
      - USER=app_user
      - PASSWORD=1234
      - HOST=mysql
      - PORT=3306

    depends_on:
      - mysql

    networks:
      - todoapp-net

    restart: unless-stopped

  mysql:
    image: mysql-local:1.0.0

    build:
      context: .
      dockerfile: Dockerfile.mysql

    container_name: my-sql

    ports:
      - "3306:3306"

    environment:
      - MYSQL_ROOT_PASSWORD=1234
      - MYSQL_DATABASE=app_db
      - MYSQL_USER=app_user
      - MYSQL_PASSWORD=1234

    volumes:
      - todoapp-db-data:/var/lib/mysql

    networks:
      - todoapp-net

volumes:
  todoapp-db-data: